# Setup manually generated on 04/05/2026

Setup:
    site_id: KUL1
    sut:
        id: piezo
    gse:
        labjack_t7:
            device_name: LabJack T7
            device_id: LJT7
            channels:
                SG_AIN0:
                    ain_channel: 0
                    voltage_range: 1.000000E-01
                    neg_voltage_range: 1.000000E-01
                    resolution_index: 0
                SG_AIN2:
                    ain_channel: 2
                    voltage_range: 1.000000E-01
                    neg_voltage_range: 1.000000E-01
                    resolution_index: 0
                SG_AIN4:
                    ain_channel: 4
                    voltage_range: 1.000000E-01
                    neg_voltage_range: 1.000000E-01
                    resolution_index: 0
            stream:
                scan_rate: 496
                resync_interval_s: 60
                buffer_size: 32768
            csv:
                enabled: True
                save_path: .
                base_filename: labjack_sg_data
                max_file_size_bytes: 5120000
            metrics:
                enabled: True
            plot:
                enabled: False
                window_seconds: 5
                interval_ms: 500
                show_stats: True
        wave_generators:
            awg1:
                device: class//egse.arbitrary_wave_generator.aim_tti.tgf4000.Tgf4000Proxy
                device_name: Wave generator AWG1 (piezos V1 + V2)
                device_id: AWG1
                device_args: ['AWG1']
                piezo_channels:
                    V1_V: 1
                    V2_V: 2
            awg2:
                device: class//egse.arbitrary_wave_generator.aim_tti.tgf4000.Tgf4000Proxy
                device_name: Wave generator AWG2 (piezo V3)
                device_id: AWG2
                device_args: ['AWG2']
                piezo_channels:
                    V3_V: 1
            piezo_tests:
                profiles:
                    LG: piezo//../../common/piezo_signals/SIGN_1_LG_v2.mat
                    LGA: piezo//../../common/piezo_signals/SIGN_2_LGA_v2.mat
                    HG: piezo//../../common/piezo_signals/SIGN_3_HG_v2.mat
                    HGA: piezo//../../common/piezo_signals/SIGN_4_HGA_v2.mat
                    SM: piezo//../../common/piezo_signals/SIGN_5_SM_v1.mat
                output_load: 50
                sine_sweep:
                    amplitude: 2.000000E-01
                    dc_offset: 1.500000E-01
                    fixed_voltage: 1.500000E-01
                    start_frequency: 1
                    stop_frequency: 1500
                    sweep_time: 40
                    labjack_logging:
                        voltage_range: 1.000000E-02
                        neg_voltage_range: 1.000000E-02
                        resolution_index: 5
                        scan_rate: 7500
                trigger_delay: 1
                soft_start:
                    time: 4
                    num_steps: 20
                    delay: 2
                safety_range: [0, 4]
                ramp:
                    amplitude: 5.000000E-01
                    period: 10
                amplification: 20
                plateau:
                    voltage: 4.000000E-01
                    duration: 60
                    edges: 1
    telemetry:
        dictionary: pandas//../../common/telemetry/tm-dictionary_v4.csv
        dictionary_kwargs:
            separator: ;
    history:
        0: Initial setup for KUL1
        1: Incl. LabJack + wave generators (piezo lifetime tests)
